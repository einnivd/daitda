<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>청년다잇다</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/puzzle-game.css" />
    <link rel="stylesheet" href="css/footer.css" />
  </head>
  <body>
    <!-- 전체 영역 -->
    <div class="wrap">
      <div class="inner">
        <!-- 퍼즐 게임 섹션 -->
        <section class="puzzle-game">
          <div class="hero">
            <h1>흩어진 나의 조각들이 모여 기회로,<br />지금 맞춰지는 중</h1>
            <h3>나만의 퍼즐을 완성해 하나뿐인 리스트를 만들어보세요.</h3>
          </div>
          <!-- 퍼즐 보드 -->
          <div class="puzzle-board">
              <h1>My Puzzle</h1>
            <!-- 보드/프레임 -->
            <img src="images/sub_page/board.png" alt="보드" />
            <img src="images/sub_page/frame.png" alt="프레임" />
            <!-- 조각 -->
            <img src="images/sub_page/puzzle-purple.png" alt="purple" />
            <img src="images/sub_page/puzzle-pink.png" alt="pink" />
            <img src="images/sub_page/puzzle-purple.png" alt="purple" />
            <img src="images/sub_page/puzzle-blue.png" alt="blue" />
            <img src="images/sub_page/puzzle-purple.png" alt="purple" />
            <img src="images/sub_page/puzzle-blue.png" alt="blue" />
            <img src="images/sub_page/puzzle-purple.png" alt="purple" />
            <img src="images/sub_page/puzzle-pink.png" alt="pink" />
            <img src="images/sub_page/puzzle-purple.png" alt="purple" />
          </div>
          <!-- 퍼즐 완성도 -->
          <div class="completion">
            <div class="completion-box">
              <img src="images/sub_page/graph.png" alt="퍼즐 완성도" />
            </div>
          </div>
          <!-- 결과 버튼 -->
          <div class="result-btn">
            <p>퍼즐 완성! 결과 보기</p>
          </div>
        </section>
      </div>
      <!-- 푸터 -->
      <footer>
        <div class="footer-inner">
          <!-- 왼쪽 로고 -->
          <div class="footer-logo">
            <img src="images/main_page/Asset 19 2.png" alt="청년 다잇다 로고" />
          </div>

          <!-- 오른쪽 정보 -->
          <div class="footer-right">
            <!-- 메뉴 -->
            <div class="footer-menu">
              <a href="#"><strong>개인정보처리방침</strong></a>
              <span>|</span>
              <a href="#">이용약관</a>
              <span>|</span>
              <a href="#">공지사항</a>
              <span>|</span>
              <a href="#">FAQ</a>
              <span>|</span>
              <a href="#">1:1문의</a>
            </div>
            <!-- 정보 -->
            <div class="footer-info">
              <p>
                TEL 123-456-7890 <span>|</span> FAX 98-765-4321 <span>|</span>
                평일 AM 09:00 ~ PM 5:00 (주말, 공휴일 휴무)
              </p>
              <p>
                (54321)대구 중구 중앙대로 12345, 6층 <span>|</span>
                시스템관련문의 daitda@example.co.kr
              </p>
            </div>
            <!-- 저작권 -->
            <div class="footer-copyright">
              <p>© 2026 청년 다잇다. All rights reserved.</p>
            </div>
            <!-- SNS 아이콘 -->
            <div class="sns">
              <a href="#"
                ><img src="images/main_page/facebook.png" alt="facebook"
              /></a>
              <a href="#"
                ><img src="images/main_page/instagram.png" alt="instagram"
              /></a>
              <a href="#"
                ><img src="images/main_page/youtube.png" alt="youtube"
              /></a>
              <a href="#"
                ><img src="images/main_page/kakaotalk.png" alt="kakao"
              /></a>
            </div>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
